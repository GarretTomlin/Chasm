name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: '0.15.2'

jobs:
  build:
    name: Build all platforms
    runs-on: macos-latest   # arm64 — has the authoritative bootstrap binary

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # ---- Install Zig (used only as a cross-compiler, not for zig build) --

      - name: Install Zig
        run: |
          ZIG_DIR="zig-aarch64-macos-${ZIG_VERSION}"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_DIR}.tar.xz" -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/${ZIG_DIR}" >> $GITHUB_PATH

      # ---- Compile the Chasm compiler source → C using self-hosted binary --

      - name: Compile compiler source to C
        run: |
          echo "c99" > /tmp/chasm_target.txt
          cat compiler/lexer.chasm \
              compiler/parser_types.chasm compiler/parser_helpers.chasm \
              compiler/parser_exprs.chasm compiler/parser_stmts.chasm \
              compiler/sema_types.chasm compiler/sema_diag.chasm \
              compiler/sema_resolve.chasm compiler/sema_expr.chasm \
              compiler/sema_stmt.chasm \
              compiler/codegen_helpers.chasm compiler/codegen_exprs.chasm \
              compiler/codegen_stmts.chasm compiler/codegen_module.chasm \
              compiler/wasm.chasm compiler/main.chasm \
              > /tmp/sema_combined.chasm
          bootstrap/bin/chasm-macos-arm64 > /tmp/compiler.c

      # ---- Cross-compile bootstrap binary for each platform ----------------

      - name: Cross-compile bootstrap binaries
        run: |
          mkdir -p bootstrap/bin

          HARNESS="runtime/chasm_standalone.c"

          # macOS arm64 (native)
          clang -O2 -Wno-int-conversion \
            -o bootstrap/bin/chasm-macos-arm64 \
            /tmp/compiler.c "$HARNESS" -I runtime/

          # macOS x86_64
          zig cc -target x86_64-macos-none -O2 -Wno-int-conversion \
            -o bootstrap/bin/chasm-macos-x86_64 \
            /tmp/compiler.c "$HARNESS" -I runtime/

          # Linux x86_64
          zig cc -target x86_64-linux-musl -O2 -Wno-int-conversion \
            -o bootstrap/bin/chasm-linux-x86_64 \
            /tmp/compiler.c "$HARNESS" -I runtime/

          # Windows x86_64
          zig cc -target x86_64-windows-gnu -O2 -Wno-int-conversion \
            -o bootstrap/bin/chasm-windows-x86_64.exe \
            /tmp/compiler.c "$HARNESS" -I runtime/

          ls -la bootstrap/bin/

      # ---- Build Go CLI and LSP for each platform --------------------------

      - name: Build CLI and LSP binaries
        run: |
          mkdir -p bin

          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.defaultChasmHome=" -o bin/chasm-macos-arm64         ./cmd/cli
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.defaultChasmHome=" -o bin/chasm-macos-x86_64       ./cmd/cli
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.defaultChasmHome=" -o bin/chasm-linux-x86_64       ./cmd/cli
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.defaultChasmHome=" -o bin/chasm-windows-x86_64.exe ./cmd/cli

          GOOS=darwin  GOARCH=arm64 go build -o bin/chasm-lsp-macos-arm64         ./cmd/lsp
          GOOS=darwin  GOARCH=amd64 go build -o bin/chasm-lsp-macos-x86_64       ./cmd/lsp
          GOOS=linux   GOARCH=amd64 go build -o bin/chasm-lsp-linux-x86_64       ./cmd/lsp
          GOOS=windows GOARCH=amd64 go build -o bin/chasm-lsp-windows-x86_64.exe ./cmd/lsp

      # ---- Package archives ------------------------------------------------

      - name: Package archives
        run: |
          TAG=${{ github.ref_name }}

          for PLATFORM in macos-arm64 macos-x86_64 linux-x86_64; do
            NAME="chasm-${TAG}-${PLATFORM}"
            mkdir -p "dist/${NAME}/bin"
            mkdir -p "dist/${NAME}/bootstrap/bin"
            cp "bin/chasm-${PLATFORM}"                    "dist/${NAME}/bin/chasm"
            cp "bin/chasm-lsp-${PLATFORM}"                "dist/${NAME}/bin/chasm-lsp"
            cp "bootstrap/bin/chasm-${PLATFORM}"          "dist/${NAME}/bootstrap/bin/chasm-${PLATFORM}" 2>/dev/null || true
            cp -r runtime                                  "dist/${NAME}/runtime"
            cp -r engine                                   "dist/${NAME}/engine"
            cp -r examples                                 "dist/${NAME}/examples"
            cp -r stdlib                                   "dist/${NAME}/stdlib" 2>/dev/null || true
            tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"
          done

          # Windows zip
          NAME="chasm-${TAG}-windows-x86_64"
          mkdir -p "dist/${NAME}/bin"
          mkdir -p "dist/${NAME}/bootstrap/bin"
          cp "bin/chasm-windows-x86_64.exe"                      "dist/${NAME}/bin/chasm.exe"
          cp "bin/chasm-lsp-windows-x86_64.exe"                  "dist/${NAME}/bin/chasm-lsp.exe"
          cp "bootstrap/bin/chasm-windows-x86_64.exe"            "dist/${NAME}/bootstrap/bin/chasm-windows-x86_64.exe" 2>/dev/null || true
          cp -r runtime                                           "dist/${NAME}/runtime"
          cp -r engine                                            "dist/${NAME}/engine"
          cp -r examples                                          "dist/${NAME}/examples"
          cp -r stdlib                                            "dist/${NAME}/stdlib" 2>/dev/null || true
          cd dist && zip -r "${NAME}.zip" "${NAME}" && cd ..

      # ---- Upload all assets to the GitHub release -------------------------

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          draft: false
          generate_release_notes: true
