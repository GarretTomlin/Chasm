name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: macos-latest   # arm64 — authoritative platform (has committed binary)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # ---- Go unit tests ---------------------------------------------------

      - name: Go tests
        run: go test ./cmd/cli/... -v -timeout 120s

      # ---- End-to-end: compile hello world ---------------------------------

      - name: Build CLI
        run: go build -ldflags "-X main.defaultChasmHome=${{ github.workspace }}" -o chasm-test ./cmd/cli

      - name: E2E — compile hello world
        run: ./chasm-test compile examples/hello_world.chasm

      # ---- Bootstrap fixpoint ----------------------------------------------

      - name: Bootstrap fixpoint
        run: |
          echo "c99" > /tmp/chasm_target.txt
          cat compiler/lexer.chasm \
              compiler/parser_types.chasm compiler/parser_helpers.chasm \
              compiler/parser_exprs.chasm compiler/parser_stmts.chasm \
              compiler/sema_types.chasm compiler/sema_diag.chasm \
              compiler/sema_resolve.chasm compiler/sema_expr.chasm \
              compiler/sema_stmt.chasm \
              compiler/codegen_helpers.chasm compiler/codegen_exprs.chasm \
              compiler/codegen_stmts.chasm compiler/codegen_module.chasm \
              compiler/wasm.chasm compiler/main.chasm \
              > /tmp/sema_combined.chasm

          bootstrap/bin/chasm-macos-arm64 > /tmp/stage1.c
          clang -O2 -Wno-int-conversion -o /tmp/stage1_bin /tmp/stage1.c runtime/chasm_standalone.c -I runtime/

          /tmp/stage1_bin > /tmp/stage2.c
          clang -O2 -Wno-int-conversion -o /tmp/stage2_bin /tmp/stage2.c runtime/chasm_standalone.c -I runtime/

          /tmp/stage2_bin > /tmp/stage3.c
          diff /tmp/stage2.c /tmp/stage3.c && echo "✓ FIXPOINT" || (echo "✗ FIXPOINT FAILED" && exit 1)
